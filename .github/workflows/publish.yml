name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example, v2.0.13)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check release version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if tag != version:
              raise SystemExit(f"release tag {tag!r} does not match project version {version!r}")
          if "dev" in version:
              raise SystemExit("development versions cannot be published")
          PY

      - name: Build and check distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/beacon2-cbi-tools/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
