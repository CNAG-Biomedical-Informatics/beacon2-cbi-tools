name: Docker build (multi-arch)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build (for example, v2.0.13)
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out selected ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}

      - name: Check release version and read build metadata
        id: build_metadata
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python3 - <<'PY'
          import os
          import runpy
          import subprocess
          from pathlib import Path

          version = runpy.run_path("src/bff_tools/version.py")["VERSION"]
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if tag != version:
              raise SystemExit(
                  f"release tag {tag!r} does not match project version {version!r}"
              )

          revision = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              print(f"version={version}", file=output)
              print(f"revision={revision}", file=output)
          PY

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            BFF_TOOLS_VERSION=${{ steps.build_metadata.outputs.version }}
            VCS_REF=${{ steps.build_metadata.outputs.revision }}
          tags: |
            manuelrueda/beacon2-cbi-tools:${{ steps.build_metadata.outputs.version }}
            manuelrueda/beacon2-cbi-tools:latest
          platforms: linux/amd64,linux/arm64
