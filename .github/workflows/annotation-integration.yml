name: Full annotation integration

on:
  workflow_dispatch:
    inputs:
      download_bundle:
        description: Download and extract the maintained annotation bundle
        required: true
        type: boolean
        default: false
      data_directory:
        description: Existing bundle path on the self-hosted runner
        required: false
        default: /beacon2-cbi-tools-data

permissions:
  contents: read

jobs:
  annotation:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5

      - name: Build and install wheel
        run: |
          python3 -m pip install build
          python3 -m build --wheel
          python3 -m pip install --force-reinstall dist/*.whl

      - name: Install and test downloaded bundle
        if: inputs.download_bundle
        run: |
          bff-tools install-resources --data-dir "$RUNNER_TEMP/beacon2-cbi-tools-data"
          bff-tools test --data-dir "$RUNNER_TEMP/beacon2-cbi-tools-data"

      - name: Run with existing bundle
        if: ${{ !inputs.download_bundle }}
        run: bff-tools test --data-dir "${{ inputs.data_directory }}"
