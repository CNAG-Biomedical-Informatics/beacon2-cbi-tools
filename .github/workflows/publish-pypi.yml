name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check release version
        run: |
          python - <<'PY'
          import os
          import runpy

          version = runpy.run_path("src/bff_tools/version.py")["VERSION"]
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if tag != version:
              raise SystemExit(f"release tag {tag!r} does not match project version {version!r}")
          if "dev" in version:
              raise SystemExit("development versions cannot be published")
          PY

      - name: Build and check distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/beacon2-cbi-tools/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
