name: Build and test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install ".[test]"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: python -m pytest --cov=bff_tools --cov-report=term-missing --cov-fail-under=95

      - name: Compile Python sources
        run: python -m compileall -q src tests tools utils

      - name: Build wheel and source distribution
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install build
          python -m build
          python -m pip install --force-reinstall dist/*.whl
          cd /tmp
          bff-tools --version
          bff-tools validate --help
          bff-tools install-resources --help
          bff-tools install-resources --print-links
          bff-tools doctor --no-color
          bff-tools test --help
          bff-tools compare --help
          bff-tools demo --output-dir /tmp/bff-tools-wheel-demo --no-browser
          bff-tools validate --check-schema
          bff-tools validate --input /tmp/bff-tools-wheel-demo/vcf/genomicVariationsVcf.json.gz --gv-vcf --check-schema --no-color --no-emoji
          python - <<'PY'
          import os
          from pathlib import Path
          from bff_tools.config import DATA_ROOT_ENV, default_config_path, read_config_file
          from bff_tools.integration import REQUIRED_ASSETS

          config_path = default_config_path()
          assert config_path.is_file(), config_path
          assert config_path.name == "config.yaml", config_path
          assert all(path.is_file() for path in REQUIRED_ASSETS), REQUIRED_ASSETS
          os.environ[DATA_ROOT_ENV] = "~/bff-tools-wheel-data"
          config = read_config_file(None, annotate=False)
          assert config["base"] == str(Path("~/bff-tools-wheel-data").expanduser().resolve())
          PY

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check shell syntax
        run: bash -n src/bff_tools/pipeline/partial/*.sh utils/_models2xlsx/*.sh

      - name: Check patch whitespace
        run: git diff --check HEAD
