name: Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install ".[test]"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run tests with coverage (for Coveralls)
        if: matrix.python-version == '3.12'
        run: python -m pytest --cov=bff_tools --cov-report=xml --cov-report=term-missing --cov-fail-under=95

      - name: Upload coverage to Coveralls
        if: matrix.python-version == '3.12'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: cobertura
          file: coverage.xml

      - name: Compile Python sources
        run: python -m compileall -q src tests tools

      - name: Build wheel and source distribution
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install build
          python -m build
          python -m pip install --force-reinstall dist/*.whl
          cd /tmp
          bff-tools --version
          bff-tools validate --help

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check shell syntax
        run: bash -n src/bff_tools/pipeline/partial/*.sh

      - name: Check patch whitespace
        run: git diff --check HEAD
