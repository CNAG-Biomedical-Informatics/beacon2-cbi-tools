name: Publish to TestPyPI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build,test]"
          python -m pytest --cov=bff_tools --cov-report=term-missing --cov-fail-under=95
          python -m build
          python -m twine check dist/*

      - name: Test the built wheel
        run: |
          python -m venv /tmp/bff-tools-wheel-test
          /tmp/bff-tools-wheel-test/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/bff-tools-wheel-test/bin/bff-tools --version
          /tmp/bff-tools-wheel-test/bin/bff-tools validate --check-schema
          /tmp/bff-tools-wheel-test/bin/bff-tools demo \
            --output-dir /tmp/bff-tools-testpypi-demo --no-browser

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/beacon2-cbi-tools
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
